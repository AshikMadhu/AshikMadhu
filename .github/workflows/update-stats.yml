name: Update GitHub Stats Cards

on:
  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main
    paths:
      - 'fetch_real_stats.py'
      - 'assemble_assets.py'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Real Stats
        run: python fetch_real_stats.py

      - name: Assemble SVG Assets
        run: python assemble_assets.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg langs.svg real_stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update real-time github stats" && git push)
