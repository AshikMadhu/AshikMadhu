<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0314" />
      <stop offset="100%" stop-color="#1b0629" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b91" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#7a00f2" stop-opacity="0.1" />
    </linearGradient>
    
    <!-- Glowing Soft Filter -->
    <filter id="lang-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    
    /* Loading language progress bars */
    @keyframes load-bar {
      from { width: 0px; }
      to { width: var(--target-w); }
    }
    .bar-fill {
      animation: load-bar 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      width: 0;
    }
    
    /* Fading in text delays */
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .lang-item { opacity: 0; animation: fade-in 0.5s ease-out forwards; }
    .item-1 { animation-delay: 0.1s; }
    .item-2 { animation-delay: 0.2s; }
    .item-3 { animation-delay: 0.3s; }
    .item-4 { animation-delay: 0.4s; }
    .item-5 { animation-delay: 0.5s; }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="448" height="198" rx="16" fill="url(#card-bg)" stroke="url(#border-grad)" stroke-width="1.5" />
  
  <g transform="translate(25, 0)" class="font-sans">
    <!-- Header -->
    <text x="0" y="32" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="1.5">MOST USED LANGUAGES</text>
    <line x1="0" y1="42" x2="398" y2="42" stroke="#ff4b91" stroke-width="1" opacity="0.3" />
    
    <!-- JavaScript -->
    <g class="lang-item item-1" transform="translate(0, 68)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#ffffff">JavaScript</text>
      <rect x="90" y="-10" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="90" y="-10" height="8" rx="4" fill="#ff4b91" class="bar-fill" style="--target-w: 220px;" filter="url(#lang-glow)" />
      <text x="390" y="0" font-size="12" font-weight="bold" fill="#ff4b91" class="font-mono" text-anchor="end">91.6%</text>
    </g>

    <!-- Python -->
    <g class="lang-item item-2" transform="translate(0, 94)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#ffffff">Python</text>
      <rect x="90" y="-10" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="90" y="-10" height="8" rx="4" fill="#d400d4" class="bar-fill" style="--target-w: 190px;" filter="url(#lang-glow)" />
      <text x="390" y="0" font-size="12" font-weight="bold" fill="#d400d4" class="font-mono" text-anchor="end">79.2%</text>
    </g>

    <!-- CSS & HTML -->
    <g class="lang-item item-3" transform="translate(0, 120)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#ffffff">CSS &amp; HTML</text>
      <rect x="90" y="-10" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="90" y="-10" height="8" rx="4" fill="#7a00f2" class="bar-fill" style="--target-w: 155px;" filter="url(#lang-glow)" />
      <text x="390" y="0" font-size="12" font-weight="bold" fill="#7a00f2" class="font-mono" text-anchor="end">64.5%</text>
    </g>

    <!-- C++ -->
    <g class="lang-item item-4" transform="translate(0, 146)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#ffffff">C / C++</text>
      <rect x="90" y="-10" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="90" y="-10" height="8" rx="4" fill="#ff4b91" class="bar-fill" style="--target-w: 108px;" filter="url(#lang-glow)" />
      <text x="390" y="0" font-size="12" font-weight="bold" fill="#ff4b91" class="font-mono" text-anchor="end">45.0%</text>
    </g>

    <!-- Figma -->
    <g class="lang-item item-5" transform="translate(0, 172)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#ffffff">Figma UI/UX</text>
      <rect x="90" y="-10" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="90" y="-10" height="8" rx="4" fill="#d400d4" class="bar-fill" style="--target-w: 132px;" filter="url(#lang-glow)" />
      <text x="390" y="0" font-size="12" font-weight="bold" fill="#d400d4" class="font-mono" text-anchor="end">55.0%</text>
    </g>
  </g>
</svg>