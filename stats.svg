<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0314" />
      <stop offset="100%" stop-color="#1b0629" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b91" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#7a00f2" stop-opacity="0.1" />
    </linearGradient>
    
    <!-- Rank Circle Glow -->
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4b91" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff4b91" stop-opacity="0" />
    </radialGradient>
    
    <filter id="card-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    
    /* Rank Ring drawing animation */
    @keyframes draw-ring {
      from { stroke-dashoffset: 283; }
      to { stroke-dashoffset: 28.3; } /* 90% progress */
    }
    .rank-ring {
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: draw-ring 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transform: rotate(-90deg);
      transform-origin: 75px 100px;
    }
    
    /* Rank text pulse */
    @keyframes pulse-rank {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 75, 145, 0.6)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 12px rgba(255, 75, 145, 0.9)); }
    }
    .rank-text {
      animation: pulse-rank 3s ease-in-out infinite;
      transform-origin: 75px 100px;
    }
    
    /* Stats list items sliding in */
    @keyframes slide-in {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .stat-row { opacity: 0; animation: slide-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .row-1 { animation-delay: 0.2s; }
    .row-2 { animation-delay: 0.4s; }
    .row-3 { animation-delay: 0.6s; }
    .row-4 { animation-delay: 0.8s; }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="448" height="198" rx="16" fill="url(#card-bg)" stroke="url(#border-grad)" stroke-width="1.5" />
  
  <!-- Outer glowing rings behind Rank -->
  <circle cx="75" cy="100" r="55" fill="url(#ring-glow)" />
  
  <!-- Rank Ring (Percentage indicator) -->
  <circle cx="75" cy="100" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6" />
  <circle cx="75" cy="100" r="45" fill="none" stroke="#ff4b91" stroke-width="6" stroke-linecap="round" class="rank-ring" filter="url(#card-glow)" />
  
  <!-- Rank Badge Text -->
  <g class="rank-text">
    <text x="75" y="108" font-size="28" font-weight="900" fill="#ffffff" class="font-sans" text-anchor="middle" letter-spacing="1">A+</text>
  </g>
  <text x="75" y="162" font-size="10" font-weight="bold" fill="#ff4b91" class="font-sans" text-anchor="middle" letter-spacing="2">PROFILE RANK</text>

  <!-- Divider Line -->
  <line x1="150" y1="30" x2="150" y2="170" stroke="rgba(255, 75, 145, 0.15)" stroke-width="1.2" />

  <!-- Stats Rows -->
  <g transform="translate(175, 0)" class="font-sans">
    <!-- Header -->
    <text x="0" y="32" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="1.5">ASHIK'S GITHUB STATS</text>
    <line x1="0" y1="42" x2="220" y2="42" stroke="#ff4b91" stroke-width="1" opacity="0.3" />
    
    <!-- Commits -->
    <g class="stat-row row-1" transform="translate(0, 68)">
      <circle cx="5" cy="-5" r="3" fill="#ff4b91" />
      <text x="18" y="0" font-size="12" fill="#bcabbf" font-weight="bold">Total Commits</text>
      <text x="220" y="0" font-size="13" font-weight="bold" fill="#ffffff" class="font-mono" text-anchor="end">1,452</text>
    </g>
    
    <!-- PRs -->
    <g class="stat-row row-2" transform="translate(0, 96)">
      <circle cx="5" cy="-5" r="3" fill="#d400d4" />
      <text x="18" y="0" font-size="12" fill="#bcabbf" font-weight="bold">Pull Requests</text>
      <text x="220" y="0" font-size="13" font-weight="bold" fill="#ffffff" class="font-mono" text-anchor="end">184</text>
    </g>
    
    <!-- Issues -->
    <g class="stat-row row-3" transform="translate(0, 124)">
      <circle cx="5" cy="-5" r="3" fill="#7a00f2" />
      <text x="18" y="0" font-size="12" fill="#bcabbf" font-weight="bold">Issues Solved</text>
      <text x="220" y="0" font-size="13" font-weight="bold" fill="#ffffff" class="font-mono" text-anchor="end">72</text>
    </g>
    
    <!-- Repos -->
    <g class="stat-row row-4" transform="translate(0, 152)">
      <circle cx="5" cy="-5" r="3" fill="#ff4b91" />
      <text x="18" y="0" font-size="12" fill="#bcabbf" font-weight="bold">Total Repositories</text>
      <text x="220" y="0" font-size="13" font-weight="bold" fill="#ffffff" class="font-mono" text-anchor="end">48</text>
    </g>
  </g>
</svg>