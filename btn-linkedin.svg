<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btn-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="btn-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .text-btn {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 1.5px;
    }
    
    /* Flowing neon border animation */
    @keyframes border-flow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -460; }
    }
    .flowing-border {
      stroke-dasharray: 100 360;
      stroke-dashoffset: 0;
      animation: border-flow 3.5s linear infinite;
    }
    
    /* Subtle hover pulse styling */
    @keyframes pulse-light {
      0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 2px #00f0ff); }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f0ff); }
    }
    .glow-element {
      animation: pulse-light 3s ease-in-out infinite;
    }
  </style>

  <!-- Button Card Backing -->
  <rect x="1" y="1" width="178" height="48" rx="24" fill="url(#btn-bg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" />
  
  <!-- Flowing Neon Path -->
  <rect x="1" y="1" width="178" height="48" rx="24" fill="none" stroke="#00f0ff" stroke-width="2.5" class="flowing-border glow-element" filter="url(#btn-glow)" />

  <!-- Center Group -->
  <g transform="translate(25, 0)">
    <!-- Icon -->
    <g transform="translate(0, 15)" fill="#00f0ff" class="glow-element">
      <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" fill="#00f0ff" />
    </g>
    <!-- Label -->
    <text x="35" y="30" class="text-btn">LINKEDIN</text>
  </g>
</svg>